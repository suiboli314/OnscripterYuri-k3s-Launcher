server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index onsyuri.html index.html;

    # Enable CORS for all requests (required for WebAssembly + XHR file loading)
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods "GET, OPTIONS";
    add_header Access-Control-Allow-Headers "Range, Content-Type";
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range";

    # Serve all files with range-request support (needed for lazy loading)
    # NOTE: no custom wasm block — nginx:1.27-alpine already has application/wasm
    # in its built-in mime.types. Adding it again causes duplicate MIME headers.
    location / {
        try_files $uri $uri/ =404;
        add_header Accept-Ranges bytes;
        add_header Access-Control-Allow-Origin *;
    }

    # Cache static game assets aggressively
    location ~* \.(ogg|wav|mp3|jpg|jpeg|png|bmp|ttf|otf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
    }

    # Never cache the index so restarts are always picked up
    location = /onsyuri_index.json {
        add_header Cache-Control "no-store";
        add_header Access-Control-Allow-Origin *;
    }
}