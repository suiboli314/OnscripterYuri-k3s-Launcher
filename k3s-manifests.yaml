# ═══════════════════════════════════════════════════════════════════════════
#  OnscripterYuri – k3s manifests
#  Folder layout assumed:
#    <ROOT_PATH>/
#    ├── onsyuri.html / .js / .wasm
#    ├── onsyuri_index.json            ← generated by init container
#    ├── onsyuri_index.py              ← cloned from GitHub, used by init container
#    └── ${GAME_SUBDIR}/               ← game assets
#
#  nginx.conf lives next to onsyuri-k3s.sh (SCRIPT_DIR), mounted via hostPath.
#  All ${...} placeholders are substituted by envsubst in onsyuri-k3s.sh.
# ═══════════════════════════════════════════════════════════════════════════

---
# ── Namespace ───────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: onsyuri

---
# ── PersistentVolume: game root (ROOT_PATH) ─────────────────────────────────
# Contains web engine files, onsyuri_index.py, and the game subfolder.
# ReadWriteOnce is sufficient — single node, init container writes index.json.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: onsyuri-root-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce               # needs Write so init container can write index.json
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  hostPath:
    path: ${ROOT_PATH}            # substituted by onsyuri-k3s.sh at apply time
    type: DirectoryOrCreate

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: onsyuri-root-pvc
  namespace: onsyuri
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
  volumeName: onsyuri-root-pv

---
# ── PersistentVolume: script dir (where onsyuri-k3s.sh and nginx.conf live) ─
apiVersion: v1
kind: PersistentVolume
metadata:
  name: onsyuri-scripts-pv
spec:
  capacity:
    storage: 1Mi
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  hostPath:
    path: ${SCRIPT_DIR}
    type: Directory

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: onsyuri-scripts-pvc
  namespace: onsyuri
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: local-path
  resources:
    requests:
      storage: 1Mi
  volumeName: onsyuri-scripts-pv

---
# ── Deployment ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onsyuri
  namespace: onsyuri
  labels:
    app: onsyuri
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onsyuri
  template:
    metadata:
      labels:
        app: onsyuri
    spec:
      # ── Init container ────────────────────────────────────────────────────
      # Runs onsyuri_index.py from ROOT_PATH (already on disk from GitHub clone).
      # -i  → game subfolder; title/gamedir/savedir derived from GAME_SUBDIR name
      # -o  → writes onsyuri_index.json into ROOT_PATH next to onsyuri.html
      # --urlbase is the relative subpath only (no LAN IP needed) — the browser
      # prepends window.location.href automatically when fetching assets.
      initContainers:
        - name: index-generator
          image: python:3.12-slim
          command:
            - sh
            - -c
            - |
              python /serve/onsyuri_index.py \
                -i /serve/$(GAME_SUBDIR) \
                -o /serve/onsyuri_index.json \
                --urlbase "$(GAME_SUBDIR)/" \
                --lazyload
          env:
            - name: GAME_SUBDIR
              value: "${GAME_SUBDIR}"
          volumeMounts:
            - name: root-files
              mountPath: /serve

      # ── nginx container ───────────────────────────────────────────────────
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          # Remove default.conf so it doesn't conflict with onsyuri.conf
          command: ["/bin/sh", "-c", "rm -f /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"]
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: root-files
              mountPath: /usr/share/nginx/html
            - name: script-files
              mountPath: /etc/nginx/conf.d/onsyuri.conf
              subPath: nginx.conf    # nginx.conf sits next to onsyuri-k3s.sh

      volumes:
        - name: root-files
          persistentVolumeClaim:
            claimName: onsyuri-root-pvc
        - name: script-files
          persistentVolumeClaim:
            claimName: onsyuri-scripts-pvc

---
# ── Service: expose on fixed NodePort ──────────────────────────────────────
# NodePort 30080 → reachable at http://<WSL2-IP>:30080 from LAN.
# If you use Traefik (k3s default ingress), see the Ingress below instead.

# apiVersion: v1
# kind: Service
# metadata:
#   name: onsyuri
#   namespace: onsyuri
# spec:
#   type: NodePort
#   selector:
#     app: onsyuri
#   ports:
#     - name: http
#       protocol: TCP
#       port: 80
#       targetPort: 80
#       nodePort: 30080          # access via http://<host-lan-ip>:30080

---
# ── Service (ClusterIP — Traefik handles external access) ───────────────────
apiVersion: v1
kind: Service
metadata:
  name: onsyuri
  namespace: onsyuri
spec:
  type: ClusterIP
  selector:
    app: onsyuri
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80

---
# ── Ingress (Traefik) ────────────────────────────────────────────────────────
# Traefik is k3s's built-in ingress controller.
# Accessible at http://<LAN_IP>:80/ from any device on the LAN.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: onsyuri
  namespace: onsyuri
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: onsyuri
                port:
                  number: 80
